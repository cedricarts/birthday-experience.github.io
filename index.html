<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Experience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(255,255,255,0.25);
      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.45);
      --text-tertiary: rgba(255,255,255,0.25);
      --accent: #e8d5b7;
      --accent-dim: rgba(232,213,183,0.15);
      --glow: rgba(232,213,183,0.08);
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Sora', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { overflow-x: hidden; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Input styles ── */
    .field-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      padding: 12px 0;
      outline: none;
      transition: border-color 0.3s ease;
      caret-color: var(--accent);
    }
    .field-input::placeholder { color: var(--text-tertiary); }
    .field-input:focus { border-bottom-color: var(--border-focus); box-shadow: 0 1px 0 0 rgba(255,255,255,0.1); }
    .field-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

    textarea.field-input { resize: none; padding: 12px 0; line-height: 1.6; }

    /* ── Button ── */
    .btn-glass {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text-primary);
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 14px 32px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      white-space: nowrap;
    }
    .btn-glass:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .btn-glass:active { transform: scale(0.99); }
    .btn-glass.accent {
      background: rgba(232,213,183,0.1);
      border-color: rgba(232,213,183,0.25);
      color: var(--accent);
    }
    .btn-glass.accent:hover {
      background: rgba(232,213,183,0.15);
      border-color: rgba(232,213,183,0.4);
      box-shadow: 0 8px 32px rgba(232,213,183,0.08);
    }

    /* ── Card ── */
    .glass-card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 40px;
    }

    /* ── Countdown digits ── */
    .digit-block {
      font-family: 'DM Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .digit-label {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* ── Ambient bg blobs ── */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Output box ── */
    .output-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-secondary);
      word-break: break-all;
      line-height: 1.6;
    }

    /* ── Gift reveal ── */
    .gift-code {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.2rem, 4vw, 2rem);
      letter-spacing: 0.15em;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Separator ── */
    .sep {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 0 auto;
    }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── Transitions ── */
    .fade-enter { opacity: 0; transform: translateY(16px); }
    .fade-visible { opacity: 1; transform: translateY(0); transition: opacity 0.7s ease, transform 0.7s ease; }

    @media (max-width: 640px) {
      .glass-card { padding: 28px 20px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Simple hash router ────────────────────────────────────────────────────
    function useRouter() {
      const [location, setLocation] = useState(() => {
        const h = window.location.hash || '#/';
        return { path: h.replace('#', '').split('?')[0] || '/', search: h.includes('?') ? '?' + h.split('?')[1] : '' };
      });

      useEffect(() => {
        const handler = () => {
          const h = window.location.hash || '#/';
          setLocation({ path: h.replace('#', '').split('?')[0] || '/', search: h.includes('?') ? '?' + h.split('?')[1] : '' });
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return { location, navigate };
    }

    function useSearchParams(search) {
      return new URLSearchParams(search);
    }

    // ─── Confetti ─────────────────────────────────────────────────────────────
    function Confetti() {
      const canvasRef = useRef(null);
      const animRef = useRef(null);
      const particlesRef = useRef([]);

      const COLORS = ['#e8d5b7', '#d4b896', '#f5ead8', '#c8a882', '#ede0cc', '#b8966e'];
      const COUNT = 80;

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        particlesRef.current = Array.from({ length: COUNT }, () => ({
          x: Math.random() * canvas.width,
          y: -20 - Math.random() * canvas.height,
          w: 6 + Math.random() * 8,
          h: 3 + Math.random() * 4,
          r: Math.random() * Math.PI * 2,
          dr: (Math.random() - 0.5) * 0.04,
          vy: 0.4 + Math.random() * 0.8,
          vx: (Math.random() - 0.5) * 0.5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          opacity: 0.6 + Math.random() * 0.4,
        }));

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particlesRef.current.forEach(p => {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.r);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
            p.y += p.vy;
            p.x += p.vx;
            p.r += p.dr;
            if (p.y > canvas.height + 20) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
          });
          animRef.current = requestAnimationFrame(draw);
        };
        draw();

        return () => {
          cancelAnimationFrame(animRef.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      return <canvas ref={canvasRef} id="confetti-canvas" />;
    }

    // ─── Animated element ─────────────────────────────────────────────────────
    function Reveal({ children, delay = 0, style = {} }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setVisible(true), delay);
        return () => clearTimeout(t);
      }, [delay]);

      return (
        <div
          ref={ref}
          className={visible ? 'fade-visible' : 'fade-enter'}
          style={{ transitionDelay: `${delay}ms`, ...style }}
        >
          {children}
        </div>
      );
    }

    // ─── Ambient background ───────────────────────────────────────────────────
    function AmbientBg({ celebrate }) {
      return (
        <>
          <div className="ambient" style={{
            width: '600px', height: '600px',
            background: celebrate ? 'rgba(232,213,183,0.06)' : 'rgba(255,255,255,0.03)',
            top: '-200px', right: '-100px',
            transition: 'background 1s ease',
          }} />
          <div className="ambient" style={{
            width: '400px', height: '400px',
            background: celebrate ? 'rgba(200,168,130,0.05)' : 'rgba(255,255,255,0.02)',
            bottom: '-100px', left: '-100px',
            transition: 'background 1s ease',
          }} />
        </>
      );
    }

    // ─── Countdown Component ──────────────────────────────────────────────────
    function Countdown({ targetDate, name }) {
      const [time, setTime] = useState({ d: 0, h: 0, m: 0, s: 0 });

      useEffect(() => {
        const update = () => {
          const now = new Date();
          const target = new Date(targetDate + 'T00:00:00');
          const diff = Math.max(0, target - now);
          const d = Math.floor(diff / 86400000);
          const h = Math.floor((diff % 86400000) / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          setTime({ d, h, m, s });
        };
        update();
        const id = setInterval(update, 1000);
        return () => clearInterval(id);
      }, [targetDate]);

      const pad = n => String(n).padStart(2, '0');

      const units = [
        { val: time.d, label: 'Days' },
        { val: time.h, label: 'Hours' },
        { val: time.m, label: 'Minutes' },
        { val: time.s, label: 'Seconds' },
      ];

      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center',
          justifyContent: 'center', padding: '24px', position: 'relative', zIndex: 1,
        }}>
          <AmbientBg celebrate={false} />
          <div style={{ textAlign: 'center', maxWidth: '640px', width: '100%' }}>
            <Reveal delay={0}>
              <p style={{
                fontSize: '0.7rem', letterSpacing: '0.22em', color: 'var(--text-tertiary)',
                textTransform: 'uppercase', marginBottom: '40px', fontWeight: 400,
              }}>Something special is coming for</p>
            </Reveal>

            <Reveal delay={120}>
              <h1 style={{
                fontSize: 'clamp(2.2rem, 8vw, 4.5rem)', fontWeight: 700,
                letterSpacing: '-0.03em', color: 'var(--text-primary)',
                marginBottom: '64px', lineHeight: 1.05,
              }}>{name}</h1>
            </Reveal>

            <Reveal delay={240}>
              <div style={{
                display: 'flex', justifyContent: 'center', gap: 'clamp(20px, 5vw, 48px)',
                marginBottom: '64px',
              }}>
                {units.map(({ val, label }, i) => (
                  <div key={label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div className="digit-block">{pad(val)}</div>
                    <div className="digit-label">{label}</div>
                  </div>
                ))}
              </div>
            </Reveal>

            <Reveal delay={360}>
              <div className="sep" />
              <p style={{
                marginTop: '32px', fontSize: '0.82rem', color: 'var(--text-tertiary)',
                fontWeight: 300, letterSpacing: '0.04em',
              }}>
                Mark your calendar.
              </p>
            </Reveal>
          </div>
        </div>
      );
    }

    // ─── Typing effect ────────────────────────────────────────────────────────
    function TypedText({ text, delay = 800 }) {
      const [displayed, setDisplayed] = useState('');
      const [started, setStarted] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setStarted(true), delay);
        return () => clearTimeout(t);
      }, [delay]);

      useEffect(() => {
        if (!started) return;
        if (displayed.length >= text.length) return;
        const t = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), 30);
        return () => clearTimeout(t);
      }, [started, displayed, text]);

      return (
        <span>
          {displayed}
          {displayed.length < text.length && started && (
            <span style={{
              display: 'inline-block', width: '2px', height: '1.1em',
              background: 'var(--accent)', marginLeft: '2px', verticalAlign: 'text-bottom',
              animation: 'blink 1s step-end infinite',
            }} />
          )}
          <style>{`@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }`}</style>
        </span>
      );
    }

    // ─── Gift reveal ──────────────────────────────────────────────────────────
    function GiftReveal({ coupon }) {
      const [opened, setOpened] = useState(false);
      const [copied, setCopied] = useState(false);

      const copy = async () => {
        await navigator.clipboard.writeText(coupon);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div style={{ marginTop: '48px' }}>
          {!opened ? (
            <button
              className="btn-glass accent"
              onClick={() => setOpened(true)}
              style={{ fontSize: '0.88rem', padding: '16px 36px' }}
            >
              Open Your Gift
            </button>
          ) : (
            <div style={{
              opacity: opened ? 1 : 0,
              transform: opened ? 'translateY(0)' : 'translateY(12px)',
              transition: 'opacity 0.6s ease, transform 0.6s ease',
            }}>
              <div className="glass-card" style={{
                textAlign: 'center',
                background: 'rgba(232,213,183,0.04)',
                borderColor: 'rgba(232,213,183,0.12)',
                maxWidth: '400px', margin: '0 auto',
              }}>
                <p style={{
                  fontSize: '0.65rem', letterSpacing: '0.2em', color: 'var(--text-tertiary)',
                  textTransform: 'uppercase', marginBottom: '20px', fontWeight: 400,
                }}>Your Gift Code</p>
                <div className="gift-code" style={{ marginBottom: '28px' }}>{coupon}</div>
                <button className="btn-glass" onClick={copy} style={{ fontSize: '0.78rem', padding: '10px 24px' }}>
                  {copied ? '✓  Copied' : 'Copy Code'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Celebration Component ────────────────────────────────────────────────
    function Celebration({ name, message, coupon }) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center',
          justifyContent: 'center', padding: '24px', position: 'relative', zIndex: 1,
        }}>
          <AmbientBg celebrate={true} />
          <Confetti />

          <div style={{ textAlign: 'center', maxWidth: '680px', width: '100%' }}>
            <Reveal delay={0}>
              <p style={{
                fontSize: '0.7rem', letterSpacing: '0.22em', color: 'var(--accent)',
                textTransform: 'uppercase', marginBottom: '32px', fontWeight: 400,
                opacity: 0.7,
              }}>Today is your day</p>
            </Reveal>

            <Reveal delay={150}>
              <h1 style={{
                fontSize: 'clamp(2.4rem, 10vw, 5.5rem)', fontWeight: 800,
                letterSpacing: '-0.04em', lineHeight: 1.0,
                marginBottom: '32px',
                background: 'linear-gradient(135deg, #fff 0%, var(--accent) 60%, #c8a882 100%)',
                WebkitBackgroundClip: 'text',
                WebkitTextFillColor: 'transparent',
                backgroundClip: 'text',
              }}>
                Happy Birthday,<br />{name}
              </h1>
            </Reveal>

            {message && (
              <Reveal delay={400}>
                <p style={{
                  fontSize: 'clamp(0.95rem, 2.5vw, 1.15rem)', fontWeight: 300,
                  color: 'var(--text-secondary)', lineHeight: 1.75,
                  maxWidth: '480px', margin: '0 auto 8px',
                  letterSpacing: '0.01em',
                }}>
                  <TypedText text={message} delay={600} />
                </p>
              </Reveal>
            )}

            {coupon && (
              <Reveal delay={700}>
                <GiftReveal coupon={coupon} />
              </Reveal>
            )}

            {!coupon && (
              <Reveal delay={500}>
                <div className="sep" style={{ marginTop: '48px' }} />
              </Reveal>
            )}
          </div>
        </div>
      );
    }

    // ─── Experience Page ──────────────────────────────────────────────────────
    function Experience({ search }) {
      const params = useSearchParams(search);
      const name = params.get('n');
      const dateStr = params.get('d');
      const message = params.get('m') || '';
      const coupon = params.get('c') || '';

      // Validate
      if (!name || !dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        return (
          <div style={{
            minHeight: '100vh', display: 'flex', alignItems: 'center',
            justifyContent: 'center', padding: '24px', position: 'relative', zIndex: 1,
            textAlign: 'center',
          }}>
            <AmbientBg celebrate={false} />
            <div>
              <p style={{
                fontSize: '0.65rem', letterSpacing: '0.22em', color: 'var(--text-tertiary)',
                textTransform: 'uppercase', marginBottom: '24px',
              }}>404</p>
              <h2 style={{
                fontSize: 'clamp(1.5rem, 5vw, 2.8rem)', fontWeight: 600,
                letterSpacing: '-0.03em', color: 'var(--text-primary)', marginBottom: '16px',
              }}>The stars aren't aligned.</h2>
              <p style={{ color: 'var(--text-tertiary)', fontSize: '0.9rem', fontWeight: 300 }}>
                Invalid or incomplete link.
              </p>
              <a href="#/" style={{
                display: 'inline-block', marginTop: '40px', color: 'var(--text-secondary)',
                fontSize: '0.8rem', textDecoration: 'none', letterSpacing: '0.06em',
                borderBottom: '1px solid var(--border)',
                paddingBottom: '2px',
                transition: 'color 0.2s ease, border-color 0.2s ease',
              }}>← Generate a link</a>
            </div>
          </div>
        );
      }

      // Date comparison — local date
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const isBirthday = todayStr >= dateStr;

      return isBirthday
        ? <Celebration name={name} message={message} coupon={coupon} />
        : <Countdown targetDate={dateStr} name={name} />;
    }

    // ─── Generator Page ───────────────────────────────────────────────────────
    function Generator({ navigate }) {
      const [form, setForm] = useState({ name: '', date: '', message: '', coupon: '' });
      const [link, setLink] = useState('');
      const [copied, setCopied] = useState(false);
      const [errors, setErrors] = useState({});

      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = true;
        if (!form.date) e.date = true;
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const generate = () => {
        if (!validate()) return;
        const params = new URLSearchParams();
        params.set('n', form.name.trim());
        params.set('d', form.date);
        if (form.message.trim()) params.set('m', form.message.trim());
        if (form.coupon.trim()) params.set('c', form.coupon.trim());
        const url = `${window.location.origin}${window.location.pathname}#/celebrate?${params.toString()}`;
        setLink(url);
        setCopied(false);
      };

      const copy = async () => {
        await navigator.clipboard.writeText(link);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const preview = () => {
        if (!link) return;
        const hash = link.split('#')[1];
        window.location.hash = hash;
      };

      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center',
          justifyContent: 'center', padding: '24px', position: 'relative', zIndex: 1,
        }}>
          <AmbientBg celebrate={false} />
          <div style={{ width: '100%', maxWidth: '480px' }}>

            <Reveal delay={0}>
              <div style={{ marginBottom: '48px' }}>
                <p style={{
                  fontSize: '0.65rem', letterSpacing: '0.22em', color: 'var(--text-tertiary)',
                  textTransform: 'uppercase', marginBottom: '16px', fontWeight: 400,
                }}>Birthday Experience</p>
                <h1 style={{
                  fontSize: 'clamp(1.8rem, 5vw, 2.8rem)', fontWeight: 700,
                  letterSpacing: '-0.035em', color: 'var(--text-primary)', lineHeight: 1.1,
                }}>Make someone feel<br />extraordinary.</h1>
              </div>
            </Reveal>

            <Reveal delay={150}>
              <div className="glass-card">
                {/* Name */}
                <div style={{ marginBottom: '32px' }}>
                  <label style={{
                    display: 'block', fontSize: '0.65rem', letterSpacing: '0.16em',
                    color: 'var(--text-tertiary)', textTransform: 'uppercase',
                    marginBottom: '10px', fontWeight: 400,
                  }}>Name <span style={{ color: errors.name ? '#ff6b6b' : 'transparent' }}>*</span></label>
                  <input
                    className="field-input"
                    type="text"
                    placeholder="Their name"
                    value={form.name}
                    onChange={e => update('name', e.target.value)}
                    style={{ borderBottomColor: errors.name ? 'rgba(255,107,107,0.5)' : undefined }}
                  />
                </div>

                {/* Date */}
                <div style={{ marginBottom: '32px' }}>
                  <label style={{
                    display: 'block', fontSize: '0.65rem', letterSpacing: '0.16em',
                    color: 'var(--text-tertiary)', textTransform: 'uppercase',
                    marginBottom: '10px', fontWeight: 400,
                  }}>Birthday Date <span style={{ color: errors.date ? '#ff6b6b' : 'transparent' }}>*</span></label>
                  <input
                    className="field-input"
                    type="date"
                    value={form.date}
                    onChange={e => update('date', e.target.value)}
                    style={{ borderBottomColor: errors.date ? 'rgba(255,107,107,0.5)' : undefined }}
                  />
                </div>

                {/* Message */}
                <div style={{ marginBottom: '32px' }}>
                  <label style={{
                    display: 'block', fontSize: '0.65rem', letterSpacing: '0.16em',
                    color: 'var(--text-tertiary)', textTransform: 'uppercase',
                    marginBottom: '10px', fontWeight: 400,
                  }}>Message <span style={{ opacity: 0.4, textTransform: 'none', letterSpacing: 0, fontSize: '0.6rem' }}>optional</span></label>
                  <textarea
                    className="field-input"
                    rows={3}
                    placeholder="Write something from the heart…"
                    value={form.message}
                    onChange={e => update('message', e.target.value)}
                  />
                </div>

                {/* Coupon */}
                <div style={{ marginBottom: '40px' }}>
                  <label style={{
                    display: 'block', fontSize: '0.65rem', letterSpacing: '0.16em',
                    color: 'var(--text-tertiary)', textTransform: 'uppercase',
                    marginBottom: '10px', fontWeight: 400,
                  }}>Gift Code <span style={{ opacity: 0.4, textTransform: 'none', letterSpacing: 0, fontSize: '0.6rem' }}>optional</span></label>
                  <input
                    className="field-input"
                    type="text"
                    placeholder="e.g. BDAY30"
                    value={form.coupon}
                    onChange={e => update('coupon', e.target.value)}
                  />
                </div>

                <button className="btn-glass accent" onClick={generate} style={{ width: '100%', fontSize: '0.88rem' }}>
                  Generate Link
                </button>
              </div>
            </Reveal>

            {/* Output */}
            {link && (
              <Reveal delay={0}>
                <div style={{ marginTop: '24px' }}>
                  <div className="glass-card" style={{ padding: '24px' }}>
                    <p style={{
                      fontSize: '0.6rem', letterSpacing: '0.2em', color: 'var(--text-tertiary)',
                      textTransform: 'uppercase', marginBottom: '14px',
                    }}>Your Link</p>
                    <div className="output-box" style={{ marginBottom: '20px' }}>{link}</div>
                    <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                      <button className="btn-glass" onClick={copy} style={{
                        flex: 1, minWidth: '120px', fontSize: '0.8rem', padding: '12px 20px',
                        color: copied ? 'var(--accent)' : undefined,
                        borderColor: copied ? 'rgba(232,213,183,0.25)' : undefined,
                      }}>
                        {copied ? '✓  Copied!' : 'Copy Link'}
                      </button>
                      <button className="btn-glass" onClick={preview} style={{
                        flex: 1, minWidth: '120px', fontSize: '0.8rem', padding: '12px 20px',
                      }}>
                        Preview →
                      </button>
                    </div>
                  </div>
                </div>
              </Reveal>
            )}

          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const { location, navigate } = useRouter();

      // Ensure hash is set on first load
      useEffect(() => {
        if (!window.location.hash) window.location.hash = '#/';
      }, []);

      const { path, search } = location;

      return (
        <>
          {path === '/celebrate'
            ? <Experience search={search} />
            : <Generator navigate={navigate} />
          }
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
